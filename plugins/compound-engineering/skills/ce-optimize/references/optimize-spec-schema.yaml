# Optimization Spec Schema（优化规格 schema）
# 这是用户创建 optimization spec files 时使用的 canonical schema，
# 用于配置一次 /ce-optimize run。orchestrating agent 会在继续前
# 根据此 schema validate specs。
#
# 用法：创建一个匹配此 schema 的 YAML file，并传给 /ce-optimize。
# agent 会读取此 spec，validate required fields，并用它
# 配置整个 optimization run。

# ============================================================================
# REQUIRED FIELDS
# ============================================================================

required_fields:

  name:
    type: string
    pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    description: "此 optimization run 的 unique identifier（lowercase kebab-case，对 git refs 和 worktree paths 安全）"
    example: "improve-issue-clustering"

  description:
    type: string
    description: "optimization goal 的 human-readable description"
    example: "提升 issue/PR clusters 的 coherence 和 coverage"

  metric:
    type: object
    description: "三层 metric configuration"
    required_children:

      primary:
        type: object
        description: "loop 用来 optimize 的 metric"
        required_children:

          type:
            type: enum
            values:
              - hard    # 来自 measurement command 的 scalar metric（例如 build time、test pass rate）
              - judge   # 来自 sampled outputs 的 LLM-as-judge quality score
            description: "primary metric 是直接来自 measurement command，还是来自 LLM-as-judge evaluation"

          name:
            type: string
            description: "Metric name：必须匹配 measurement command JSON output 中的 key（hard type）或 scoring field（judge type）"
            example: "cluster_coherence"

          direction:
            type: enum
            values:
              - maximize
              - minimize
            description: "higher 或 lower 哪个更好"

        optional_children:

          baseline:
            type: number
            default: null
            description: "Phase 1 baseline measurement 期间自动填充。不要手动设置。"

          target:
            type: number
            default: null
            description: "Optional target value。达到此值时 loop 停止。"
            example: 4.2

      degenerate_gates:
        type: array
        description: "快速 boolean checks，用于在 expensive evaluation 前 reject obviously broken solutions。最先运行，早于 primary metric 或 judge。"
        required: true
        items:
          type: object
          required_children:
            name:
              type: string
              description: "Metric name：必须匹配 measurement command JSON output 中的 key"
            check:
              type: string
              description: "Comparison operator 和 threshold。Supported operators: >=, <=, >, <, ==, !="
              example: "<= 0.10"
          optional_children:
            description:
              type: string
              description: "说明此 gate 捕捉什么的 human-readable explanation"

    optional_children:

      diagnostics:
        type: array
        default: []
        description: "为理解而记录、但永不 gate 的 metrics。用于理解 primary metric 为什么变化。"
        items:
          type: object
          required_children:
            name:
              type: string
              description: "Metric name：必须匹配 measurement command JSON output 中的 key"

      judge:
        type: object
        description: "LLM-as-judge configuration。当 metric.primary.type 为 'judge' 时 required；type 为 'hard' 时 ignored。"
        required_when: "metric.primary.type == 'judge'"
        required_children:
          rubric:
            type: string
            description: "发送给 judge model 的 multi-line rubric text。必须指示 judge 返回 JSON。"
            example: |
              按 1-5 分评价此 cluster：
              - 5: 所有 items 明确关于同一 issue/feature
              - 4: theme 很强，只有 minor outliers
              - 3: 相关，但覆盖 2-3 个 sub-topics
              - 2: connection 较弱
              - 1: unrelated items 被分到一起
          scoring:
            type: object
            required_children:
              primary:
                type: string
                description: "judge JSON output 中作为 primary optimization target 使用的 field name"
                example: "mean_score"
            optional_children:
              secondary:
                type: array
                default: []
                description: "要记录的 additional scoring fields（不作为 optimize 目标）"
        optional_children:
          model:
            type: enum
            values:
              - haiku
              - sonnet
            default: haiku
            description: "用于 judge evaluation 的 model。Haiku 更便宜更快；Sonnet 更 nuanced。"
          sample_size:
            type: integer
            default: 10
            description: "每个 experiment 为 judge evaluation sample 的 output items 总数"
          stratification:
            type: array
            default: null
            description: "Stratified sampling buckets。如果为 null，则使用 uniform random sampling。"
            items:
              type: object
              required_children:
                bucket:
                  type: string
                  description: "此 stratum 的 bucket name"
                count:
                  type: integer
                  description: "从此 bucket 中 sample 的 items 数量"
          singleton_sample:
            type: integer
            default: 0
            description: "用于 false-negative evaluation 的 singleton items sample 数量"
          singleton_rubric:
            type: string
            default: null
            description: "用于评价 sampled singletons 的 rubric。当 singleton_sample > 0 时 required。"
          sample_seed:
            type: integer
            default: 42
            description: "用于跨 experiments reproducible sampling 的 fixed seed"
          batch_size:
            type: integer
            default: 5
            description: "每个 judge sub-agent batch 的 samples 数量。控制 parallelism 与 overhead 的取舍。"
          minimum_improvement:
            type: number
            default: 0.3
            description: "将 experiment 接受为 'better' 所需的 minimum judge score improvement。当 experiments 之间 output structure 变化时，用于考虑 sample-composition variance。不同于处理 run-to-run flakiness 的 measurement.stability.noise_threshold。"
          max_total_cost_usd:
            type: number
            default: 5
            description: "当 cumulative judge spend 达到此 cap 时停止 judge evaluation。这是 first-run safety default；仅当 rubric 和 harness 可信后再提高。只有得到 explicit user approval 才能设为 null。"

  measurement:
    type: object
    description: "如何运行 measurement harness"
    required_children:
      command:
        type: string
        description: "运行 evaluation 并向 stdout 输出 JSON 的 shell command。JSON 必须包含匹配所有 gate names 和 diagnostic names 的 keys。"
        example: "python evaluate.py"
    optional_children:
      timeout_seconds:
        type: integer
        default: 600
        description: "measurement command 被 kill 前允许运行的 maximum seconds"
      output_format:
        type: enum
        values:
          - json
        default: json
        description: "measurement command stdout 的 format。目前只支持 JSON。"
      working_directory:
        type: string
        default: "."
        description: "measurement command 的 working directory，相对 repo root"
      stability:
        type: object
        default: { mode: "stable" }
        description: "如何处理 runs 之间的 metric variance"
        required_children:
          mode:
            type: enum
            values:
              - stable   # 运行一次并信任结果
              - repeat   # 运行 N 次并 aggregate
            default: stable
        optional_children:
          repeat_count:
            type: integer
            default: 5
            description: "mode 为 'repeat' 时运行 harness 的次数"
          aggregation:
            type: enum
            values:
              - median
              - mean
              - min
              - max
            default: median
            description: "如何将 repeated measurements 合并成单个 value"
          noise_threshold:
            type: number
            default: 0.02
            description: "improvement 必须超过此值，才算 real improvement（而非 noise）。仅应用于 hard metrics。"

  scope:
    type: object
    description: "experiment agent 被允许修改的内容"
    required_children:
      mutable:
        type: array
        description: "agent 在 experiments 期间 MAY modify 的 files 和 directories"
        items:
          type: string
          description: "File path 或 directory（相对 repo root）。Directories 匹配其内所有 files。"
        example:
          - "src/clustering/"
          - "src/preprocessing/"
          - "config/clustering.yaml"
      immutable:
        type: array
        description: "agent MUST NOT modify 的 files 和 directories。measurement harness 应始终列在这里。"
        items:
          type: string
        example:
          - "evaluate.py"
          - "tests/fixtures/"
          - "data/"

# ============================================================================
# OPTIONAL FIELDS
# ============================================================================

optional_fields:

  execution:
    type: object
    default: { mode: "parallel", backend: "worktree", max_concurrent: 4 }
    description: "experiments 如何执行"
    optional_children:
      mode:
        type: enum
        values:
          - parallel  # 同时运行 experiments（default）
          - serial    # 一次运行一个
        default: parallel
      backend:
        type: enum
        values:
          - worktree  # 使用 git worktrees 做 isolation（default）
          - codex     # 使用 Codex sandboxes 做 isolation
        default: worktree
      max_concurrent:
        type: integer
        default: 4
        minimum: 1
        description: "并行运行的 maximum experiments 数量。worktree backend capped at 6；8+ 仅对 Codex backend 有效。"
      codex_security:
        type: enum
        values:
          - full-auto                                # --full-auto（workspace write）
          - yolo                                     # --dangerously-bypass-approvals-and-sandbox
        default: null
        description: "Codex security posture。如果为 null，每个 session 询问用户一次。"

  parallel:
    type: object
    default: {}
    description: "Phase 1 中 discovered 或 set 的 parallelism configuration"
    optional_children:
      port_strategy:
        type: enum
        values:
          - parameterized  # 使用 env var 配置 port
          - none           # 不需要 port parameterization
        default: null
        description: "如果为 null，则在 Phase 1 parallelism probe 期间 auto-detected"
      port_env_var:
        type: string
        default: null
        description: "用于 port parameterization 的 environment variable name（例如 EVAL_PORT）"
      port_base:
        type: integer
        default: null
        description: "Base port number。每个 experiment 获得 port_base + experiment_index。"
      shared_files:
        type: array
        default: []
        description: "必须复制到每个 experiment worktree 的 files（例如 SQLite databases）"
        items:
          type: string
      exclusive_resources:
        type: array
        default: []
        description: "需要 exclusive access 的 resources（例如 'gpu'）。如果 non-empty，则 force serial mode。"
        items:
          type: string

  dependencies:
    type: object
    default: { approved: [] }
    description: "experiments 的 dependency management"
    optional_children:
      approved:
        type: array
        default: []
        description: "experiments 可以添加的 pre-approved new dependencies"
        items:
          type: string

  constraints:
    type: array
    default: []
    description: "experiment agents 必须遵守的 free-text constraints"
    items:
      type: string
    example:
      - "不要改变 clusters 的 output format"
      - "保留与 existing cluster consumers 的 backward compatibility"

  stopping:
    type: object
    default: { max_iterations: 100, max_hours: 8, plateau_iterations: 10, target_reached: true }
    description: "optimization loop 何时停止。任何 criterion 都可以 trigger stop。"
    optional_children:
      max_iterations:
        type: integer
        default: 100
        description: "达到此 total experiments 数量后停止"
      max_hours:
        type: number
        default: 8
        description: "达到此 wall-clock hours 后停止"
      plateau_iterations:
        type: integer
        default: 10
        description: "连续这么多 experiments 没有 improvement 时停止"
      target_reached:
        type: boolean
        default: true
        description: "primary metric 达到 target value（如果设置）时停止"

  max_runner_up_merges_per_batch:
    type: integer
    default: 1
    description: "每个 batch 在 keeping best experiment 后，尝试 merge 的 file-disjoint runner-up experiments maximum number"

# ============================================================================
# VALIDATION RULES
# ============================================================================

validation_rules:
  - "所有 required fields 都必须存在"
  - "name 必须是 lowercase kebab-case（`^[a-z0-9]+(?:-[a-z0-9]+)*$`）"
  - "metric.primary.type 必须是 'hard' 或 'judge'"
  - "如果 metric.primary.type 是 'judge'，metric.judge 必须包含 rubric 和 scoring"
  - "metric.degenerate_gates 必须至少有一个 entry"
  - "measurement.command 必须是 non-empty string"
  - "scope.mutable 必须至少有一个 entry"
  - "scope.immutable 必须至少有一个 entry"
  - "Gate check operators 必须是以下之一：>=, <=, >, <, ==, !="
  - "execution.max_concurrent 必须 >= 1"
  - "当 execution.backend 是 'worktree' 时，execution.max_concurrent 不能超过 6"
  - "如果 parallel.exclusive_resources non-empty，execution.mode 应为 'serial'"
  - "如果 metric.judge.singleton_sample > 0，metric.judge.singleton_rubric 必须存在"
  - "如果 metric.primary.type 是 'judge' 且 metric.judge.max_total_cost_usd 为 null，用户应 explicit approve uncapped spend"
  - "stopping 必须至少有一个 non-default criterion，或使用 defaults"
