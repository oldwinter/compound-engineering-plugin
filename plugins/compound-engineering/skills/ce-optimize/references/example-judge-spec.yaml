# qualitative metrics 的 minimal first-run template。
# 当 true quality 需要 semantic judgment 而不是 proxy metric 时，从这里开始。

name: improve-search-relevance
description: 提升 search results 的 semantic relevance，同时避免 obvious failures

metric:
  primary:
    type: judge
    name: mean_score
    direction: maximize
  degenerate_gates:
    - name: result_count
      check: ">= 5"
      description: 返回足够 results 以判断 quality
    - name: empty_query_failures
      check: "== 0"
      description: Empty 或 trivial queries 不能 fail
  diagnostics:
    - name: latency_ms
    - name: recall_at_10
  judge:
    rubric: |
      按 1-5 分评价每组 results 的 relevance：
      - 5: Results are directly relevant and well ordered（直接相关且排序良好）
      - 4: Mostly relevant with minor ordering issues（大多相关，仅有轻微排序问题）
      - 3: Mixed relevance or one obvious miss（相关性混合，或有一个明显 miss）
      - 2: Weak relevance, several misses, or poor ordering（相关性弱，有多个 misses，或排序差）
      - 1: Mostly irrelevant（大多不相关）
      同时报告：ambiguous (boolean)
    scoring:
      primary: mean_score
      secondary:
        - ambiguous_rate
    model: haiku
    sample_size: 10
    batch_size: 5
    sample_seed: 42
    minimum_improvement: 0.2
    max_total_cost_usd: 5

measurement:
  command: "python eval_search.py"
  timeout_seconds: 300
  working_directory: "tools/eval"

scope:
  mutable:
    - "src/search/"
    - "config/search.yaml"
  immutable:
    - "tools/eval/eval_search.py"
    - "tests/fixtures/"
    - "docs/"

execution:
  mode: serial
  backend: worktree
  max_concurrent: 1

parallel:
  port_strategy: none
  shared_files: []

dependencies:
  approved: []

constraints:
  - "保留 existing search response shape"
  - "首次运行不要添加 new dependencies"

stopping:
  max_iterations: 4
  max_hours: 1
  plateau_iterations: 3
  target_reached: true

max_runner_up_merges_per_batch: 0
