name: Release PR（发布 PR）

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 检测 release PR merge
        id: detect
        run: |
          MSG=$(git log -1 --format=%s)
          if [[ "$MSG" == chore:\ release* ]]; then
            echo "is_release_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_merge=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 验证 release metadata scripts
        if: steps.detect.outputs.is_release_merge == 'false'
        run: bun run release:validate

      - name: 维护 release PR
        id: release
        uses: googleapis/release-please-action@v4.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          skip-labeling: false
