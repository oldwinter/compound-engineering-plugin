name: Release Preview（发布预览）

on:
  workflow_dispatch:
    inputs:
      title:
        description: "要评估的 Conventional title（默认使用此 ref 上最新 commit title）"
        required: false
        type: string
      compound_engineering_bump:
        description: "compound-engineering bump override（覆盖 compound-engineering 版本 bump）"
        required: false
        type: choice
        options: [auto, patch, minor, major]
        default: auto
      marketplace_bump:
        description: "marketplace bump override（覆盖 marketplace 版本 bump）"
        required: false
        type: choice
        options: [auto, patch, minor, major]
        default: auto
      cursor_marketplace_bump:
        description: "cursor-marketplace bump override（覆盖 cursor-marketplace 版本 bump）"
        required: false
        type: choice
        options: [auto, patch, minor, major]
        default: auto

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 确定 title 和 changed files
        id: inputs
        shell: bash
        run: |
          TITLE="${{ github.event.inputs.title }}"
          if [ -z "$TITLE" ]; then
            TITLE="$(git log -1 --pretty=%s)"
          fi

          FILES="$(git diff --name-only HEAD~1...HEAD | tr '\n' ' ')"

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: 添加 preview note
        run: |
          echo "此 preview 目前会根据 selected ref 的 latest commit title 和 changed files 进行评估。" >> "$GITHUB_STEP_SUMMARY"
          echo "它没有 side effects，但尚不会重建完整 accumulated open release PR state。" >> "$GITHUB_STEP_SUMMARY"

      - name: 验证 release metadata
        run: bun run release:validate

      - name: 预览 release
        shell: bash
        run: |
          TITLE='${{ steps.inputs.outputs.title }}'
          FILES='${{ steps.inputs.outputs.files }}'

          args=(--title "$TITLE" --json)
          for file in $FILES; do
            args+=(--file "$file")
          done

          args+=(--override "compound-engineering=${{ github.event.inputs.compound_engineering_bump || 'auto' }}")
          args+=(--override "marketplace=${{ github.event.inputs.marketplace_bump || 'auto' }}")
          args+=(--override "cursor-marketplace=${{ github.event.inputs.cursor_marketplace_bump || 'auto' }}")

          bun run scripts/release/preview.ts "${args[@]}" | tee /tmp/release-preview.txt

      - name: 发布 preview summary
        shell: bash
        run: cat /tmp/release-preview.txt >> "$GITHUB_STEP_SUMMARY"
