# Compound Engineering -- local config（本地配置）
# 复制到 project root 的 .compound-engineering/config.local.yaml。
# 所有 settings 都是 optional。Invalid values 会回退到 defaults。

# --- Work delegation (Codex，工作委托) ---

# work_delegate: codex           # codex | false (default: false)
# work_delegate_consent: true    # true | false (default: false)
# work_delegate_sandbox: yolo    # yolo | full-auto (default: yolo)
# work_delegate_decision: auto   # auto | ask (default: auto)
# work_delegate_model: gpt-5.4   # 任意 valid codex model（省略则使用 ~/.codex/config.toml default）
# work_delegate_effort: high     # minimal | low | medium | high | xhigh（省略则使用 ~/.codex/config.toml default）

# --- Product pulse（产品脉搏） ---
# /ce-product-pulse first-run interview 写入的 settings。重新运行该 skill，并使用
# argument `setup` 或 `reconfigure` 以交互式编辑。

# pulse_product_name: "Spiral"                          # 用于 report titles（无 default）
# pulse_lookback_default: 24h                           # 1h | 24h | 7d | 30d (default: 24h)
# pulse_primary_event: "session_started"                # 表示 "user showed up" 的 event
# pulse_value_event: "task_completed"                   # 表示 "user got value" 的 event
# pulse_completion_events: "onboarded,first_purchase"   # comma-separated，0-3 个 events
# pulse_quality_scoring: false                          # true | false（default: false；仅 AI products）
# pulse_quality_dimension: "answer accuracy"            # pulse_quality_scoring 为 true 时，按 1-5 评分的 dimension
# pulse_analytics_source: posthog                       # posthog | mixpanel | custom（无 default）
# pulse_tracing_source: sentry                          # sentry | datadog | custom（无 default）
# pulse_payments_source: stripe                         # stripe | custom（无 default）
# pulse_db_enabled: false                               # true | false（default: false；为 true 时使用 read-only DB）
# pulse_metric_sources: "retention_d7=posthog,nps=delighted"  # strategy-metric -> source overrides；comma-separated 'metric=source' pairs；未列出 metrics 回退到 pulse_analytics_source
# pulse_pending_metrics: "retention_d7,nps"             # comma-separated strategy metrics，等待 instrumentation；render 为 'no data'
# pulse_excluded_metrics: "north_star"                  # comma-separated strategy metrics，故意不纳入 pulse
