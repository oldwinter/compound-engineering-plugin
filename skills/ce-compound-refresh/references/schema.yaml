# ce-compound 写入 learnings 使用的 documentation schema
# 将它视为 docs/solutions/ 的 canonical frontmatter contract。
#
# schema 基于 problem_type 分成两条 tracks：
#   Bug track — problem_type 是 defect 或 failure（build_error、test_failure 等）
#   Knowledge track — problem_type 是 guidance 或 practice（best_practice、workflow_issue 等）
#
# 两条 tracks 共享相同 required core fields。它们的差异在于哪些
# additional fields 是 required 还是 optional（见下方 track_rules）。

# --- Track classification ---------------------------------------------------
tracks:
  bug:
    description: "已诊断并修复的 defects、failures 和 errors"
    problem_types:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
  knowledge:
    description: "Practices、patterns、conventions、decisions、workflow improvements 和 documentation"
    problem_types:
      - best_practice
      - documentation_gap
      - workflow_issue
      - developer_experience
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention

# --- Fields required by BOTH tracks -----------------------------------------
required_fields:
  module:
    type: string
    description: "受影响的 module 或 area"

  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "记录日期（YYYY-MM-DD）"

  problem_type:
    type: enum
    values:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
      - developer_experience
      - workflow_issue
      - best_practice
      - documentation_gap
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention
    description: "主要 category，用于决定 track（bug vs knowledge）。优先选择最窄的适用值；当没有更窄的 knowledge-track value 适配时，best_practice 是 fallback。"

  component:
    type: enum
    values:
      - rails_model
      - rails_controller
      - rails_view
      - service_object
      - background_job
      - database
      - frontend_stimulus
      - hotwire_turbo
      - email_processing
      - brief_system
      - assistant
      - authentication
      - payments
      - development_workflow
      - testing_framework
      - documentation
      - tooling
    description: "涉及的 component"

  severity:
    type: enum
    values:
      - critical
      - high
      - medium
      - low
    description: "影响 severity"

# --- Track-specific rules ----------------------------------------------------
track_rules:
  bug:
    required:
      symptoms:
        type: array[string]
        min_items: 1
        max_items: 5
        description: "可观察 symptoms，例如 errors 或 broken behavior"
      root_cause:
        type: enum
        values:
          - missing_association
          - missing_include
          - missing_index
          - wrong_api
          - scope_issue
          - thread_violation
          - async_timing
          - memory_leak
          - config_error
          - logic_error
          - test_isolation
          - missing_validation
          - missing_permission
          - missing_workflow_step
          - inadequate_documentation
          - missing_tooling
          - incomplete_setup
        description: "问题的 fundamental technical cause"
      resolution_type:
        type: enum
        values:
          - code_fix
          - migration
          - config_change
          - test_fix
          - dependency_update
          - environment_setup
          - workflow_improvement
          - documentation_update
          - tooling_addition
          - seed_data_update
        description: "已应用 fix 的 type"

  knowledge:
    optional:
      applies_when:
        type: array[string]
        max_items: 5
        description: "此 guidance 适用的 conditions 或 situations"
      symptoms:
        type: array[string]
        max_items: 5
        description: "促成此 guidance 的可观察 gaps 或 friction（knowledge track 可选）"
      root_cause:
        type: enum
        values:
          - missing_association
          - missing_include
          - missing_index
          - wrong_api
          - scope_issue
          - thread_violation
          - async_timing
          - memory_leak
          - config_error
          - logic_error
          - test_isolation
          - missing_validation
          - missing_permission
          - missing_workflow_step
          - inadequate_documentation
          - missing_tooling
          - incomplete_setup
        description: "Underlying cause；如果存在具体原因则填写（knowledge track 可选）"
      resolution_type:
        type: enum
        values:
          - code_fix
          - migration
          - config_change
          - test_fix
          - dependency_update
          - environment_setup
          - workflow_improvement
          - documentation_update
          - tooling_addition
          - seed_data_update
        description: "Change type；适用时填写（knowledge track 可选）"

# --- Fields optional for BOTH tracks ----------------------------------------
optional_fields:
  related_components:
    type: array[string]
    description: "涉及的其他 components"

  tags:
    type: array[string]
    max_items: 8
    description: "Search keywords，使用 lowercase 且 hyphen-separated"

# --- Fields optional for bug track only -------------------------------------
bug_optional_fields:
  rails_version:
    type: string
    pattern: '^\d+\.\d+\.\d+$'
    description: "X.Y.Z format 的 Rails version。仅与 bug-track docs 相关。"

# --- Backward compatibility --------------------------------------------------
# track system 引入之前创建的 docs，可能会在 knowledge-type
# problem_types 上带有 bug-track fields（symptoms、root_cause、resolution_type）。
# 这些是 valid legacy docs：
#   - knowledge-track doc 上存在 bug-track fields 是 harmless 的。不要
#     在 refresh 时移除它们，除非该 doc 因其他原因正在被 rewrite。
#   - 创建 NEW docs 时，遵循上方 track rules。

# --- Validation rules --------------------------------------------------------
validation_rules:
  - "使用上方 tracks section 从 problem_type 判断 track"
  - "所有 shared required_fields 都必须存在"
  - "bug-track docs 必须包含 bug-track required fields（symptoms、root_cause、resolution_type）"
  - "knowledge-track docs 除 shared fields 外没有额外 required fields"
  - "existing knowledge-track docs 上的 bug-track fields 是 harmless 的（见 backward compatibility note）"
  - "可以包含 track-specific optional fields，但不是 required"
  - "Enum fields 必须精确匹配 allowed values"
  - "指定 min_items/max_items 时，array fields 必须遵守它们"
  - "date 必须匹配 YYYY-MM-DD format"
  - "如果提供 rails_version，必须匹配 X.Y.Z format，且仅适用于 bug-track docs"
  - "tags 应为 lowercase 且 hyphen-separated"
  - "Array-of-strings frontmatter items（symptoms、applies_when、tags、related_components 或未来任何 array field）当 value 以 YAML reserved indicator（`, [, *, &, !, |, >, %, @, ?）开头，或包含 substring `: ` 时，必须包在 double quotes 中；否则 strict YAML parsers 会 reject 该文件"
